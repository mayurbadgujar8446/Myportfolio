<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Mayur Badgujar</title>
    <meta name="description" content="Sorry, the page you're looking for doesn't exist.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #e2e0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 600px;
            animation: fadeUp 0.8s ease-out;
        }

        .error-code {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            background: linear-gradient(135deg, #6366F1, #818CF8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            line-height: 1;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #e2e0f0;
        }

        p {
            font-size: 1.1rem;
            color: #7a7890;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            gap: 0.5rem;
            padding: 0.8rem 2rem;
            background: #6366F1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .btn:hover {
            background: #818CF8;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.07);
            color: #e2e0f0;
            margin-left: 1rem;
        }

        .btn-secondary:hover {
            background: #16161f;
            border-color: #6366F1;
        }

        .floating-element {
            position: fixed;
            opacity: 0.03;
            pointer-events: none;
            font-size: 10rem;
            font-weight: 900;
            z-index: 0;
        }

        .element-1 {
            top: -5%;
            left: -5%;
            animation: float 6s ease-in-out infinite;
        }

        .element-2 {
            bottom: -10%;
            right: -5%;
            animation: float 8s ease-in-out infinite;
        }

        .content {
            position: relative;
            z-index: 1;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-30px);
            }
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .button-group {
                flex-direction: column;
            }

            .btn-secondary {
                margin-left: 0;
            }

            h1 {
                font-size: 1.5rem;
            }

            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="floating-element element-1">404</div>
    <div class="floating-element element-2">404</div>

    <div class="container">
        <div class="content">
            <div class="error-code">404</div>
            <h1>Oops! Page Not Found</h1>
            <p>Sorry, the page you're looking for doesn't exist. It might have been moved or deleted.</p>

            <div class="button-group">
                <button class="btn" onclick="window.location.href='/'">
                    ← Back to Home
                </button>
                <button class="btn btn-secondary" onclick="window.history.back()">
                    ← Go Back
                </button>
            </div>

            <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid rgba(255, 255, 255, 0.07); color: #7a7890; font-size: 0.9rem;">
                <p>Lost? Here are some helpful links:</p>
                <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem;">
                    <a href="/#skills" style="color: #6366F1; text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='#818CF8'" onmouseout="this.style.color='#6366F1'">Skills</a>
                    <a href="/#projects" style="color: #6366F1; text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='#818CF8'" onmouseout="this.style.color='#6366F1'">Projects</a>
                    <a href="/#experience" style="color: #6366F1; text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='#818CF8'" onmouseout="this.style.color='#6366F1'">Experience</a>
                    <a href="/#contact" style="color: #6366F1; text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='#818CF8'" onmouseout="this.style.color='#6366F1'">Contact</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
